# design.taride.org — rendered design system specimens (static files from the
# TARIDE-org/design-system repo plus a generated index). Paste into the http { }
# block of /opt/prijsprofeet/nginx/nginx.conf.
#
# Cutover note: the :80 block is first applied in a "serve on 80" variant
# (root + ACME, no redirect) so the host is reachable for the Let's Encrypt
# HTTP-01 challenge. Once the cert exists, swap to the block below.

    # :80 -> https, with ACME webroot
    server {
        listen 80;
        listen [::]:80;
        server_name design.taride.org;
        location /.well-known/acme-challenge/ { root /var/www/html; }
        location / { return 301 https://design.taride.org$request_uri; }
    }

    # design.taride.org static site
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name design.taride.org;

        ssl_certificate /etc/letsencrypt/live/design.taride.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/design.taride.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # The specimen pages use inline <style> throughout and one inline theme
        # toggle script, so style-src and script-src allow 'unsafe-inline' here.
        # This is a self-hosted static showcase with no third-party or product
        # code, so the relaxation is contained to this subdomain.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

        root /var/www/taride/design/current;
        index index.html;

        location /fonts/ { access_log off; expires 1y; }
        location ~* \.(css|woff2|svg)$ { access_log off; expires 7d; }
        location / {
            expires 5m;
            try_files $uri $uri/ =404;
        }
    }
