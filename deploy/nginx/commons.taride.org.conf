# Paste into the http { ... } block of /opt/prijsprofeet/nginx/nginx.conf,
# near the existing server blocks. Two blocks: :80 issues the ACME challenge
# and redirects to https; :443 serves the static build out of the symlink at
# /var/www/taride/commons/current.

    # HTTP -> HTTPS redirect (commons.taride.org) + ACME webroot
    server {
        listen 80;
        listen [::]:80;
        server_name commons.taride.org;

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://commons.taride.org$request_uri;
        }
    }

    # commons.taride.org — static site
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name commons.taride.org;

        ssl_certificate /etc/letsencrypt/live/commons.taride.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/commons.taride.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers (this is a static site, no app middleware to set them)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' https://umami.taride.org; img-src 'self' data:; font-src 'self'; connect-src 'self' https://umami.taride.org; frame-ancestors 'none'; base-uri 'self'; form-action 'none'" always;

        root /var/www/taride/commons/current;
        index index.html;

        # Long cache for fingerprinted assets, short cache for HTML.
        # Note: nginx's add_header inheritance is binary - if a location block
        # defines any add_header, ALL server-level add_headers are dropped for
        # that location. Cache-Control is emitted via `expires` (which doesn't
        # use add_header internally) so the server-level security add_headers
        # are inherited everywhere.
        location /_astro/ {
            access_log off;
            expires 1y;
        }
        location /fonts/ {
            access_log off;
            expires 1y;
        }
        location /assets/ {
            access_log off;
            expires 30d;
        }
        location / {
            expires 5m;
            try_files $uri $uri/index.html =404;
        }

        error_page 404 /404.html;
    }
