#
# taride.org vhosts -- host-managed, NOT in the prijsprofeet repo.
# Pulled in by prijsprofeet nginx.conf: include /etc/nginx/sites-extra/*.conf;
# Lives outside the deploy rsync target (/opt/prijsprofeet) so it survives deploys.

    # === TARIDE :80 (commons.taride.org + umami.taride.org) ===
    server {
        listen 80;
        listen [::]:80;
        server_name commons.taride.org;
        location /.well-known/acme-challenge/ { root /var/www/html; }
        location / { return 301 https://commons.taride.org$request_uri; }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name umami.taride.org;
        location /.well-known/acme-challenge/ { root /var/www/html; }
        location / { return 301 https://umami.taride.org$request_uri; }
    }
    # === END TARIDE :80 ===

    # === TARIDE :443 (commons.taride.org) ===
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name commons.taride.org;

        ssl_certificate /etc/letsencrypt/live/commons.taride.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/commons.taride.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' https://umami.taride.org; img-src 'self' data:; font-src 'self'; connect-src 'self' https://umami.taride.org; frame-ancestors 'none'; base-uri 'self'; form-action 'none'" always;

        root /var/www/taride/commons/current;
        index index.html;

        location /_astro/ {
            access_log off;
            expires 1y;
        }
        location /fonts/ {
            access_log off;
            expires 1y;
        }
        location /assets/ {
            access_log off;
            expires 30d;
        }
        location / {
            expires 5m;
            try_files $uri $uri/index.html =404;
        }

        error_page 404 /404.html;
    }

    # === TARIDE :443 (umami.taride.org) ===
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name umami.taride.org;

        ssl_certificate /etc/letsencrypt/live/umami.taride.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/umami.taride.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        location / {
            proxy_pass http://umami;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
    # === END TARIDE :443 ===

    # === TARIDE main (taride.org + www.taride.org) ===
    server {
        listen 80;
        listen [::]:80;
        server_name taride.org www.taride.org;
        location /.well-known/acme-challenge/ { root /var/www/html; }
        location / { return 301 https://taride.org$request_uri; }
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name www.taride.org;
        ssl_certificate /etc/letsencrypt/live/taride.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/taride.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        return 301 https://taride.org$request_uri;
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name taride.org;
        ssl_certificate /etc/letsencrypt/live/taride.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/taride.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'wasm-unsafe-eval' https://umami.taride.org; img-src 'self' data:; font-src 'self'; connect-src 'self' https://umami.taride.org; frame-ancestors 'none'; base-uri 'self'; form-action 'none'" always;

        root /var/www/taride/main/current;
        index index.html;

        location /_astro/ { access_log off; expires 1y; }
        location /fonts/  { access_log off; expires 1y; }
        location /assets/ { access_log off; expires 30d; }
        location / {
            expires 5m;
            try_files $uri $uri/index.html =404;
        }

        error_page 404 /404.html;
    }
    # === END TARIDE main ===

    # === TARIDE design (design.taride.org) ===
    server {
        listen 80;
        listen [::]:80;
        server_name design.taride.org;
        location /.well-known/acme-challenge/ { root /var/www/html; }
        location / { return 301 https://design.taride.org$request_uri; }
    }

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name design.taride.org;
        ssl_certificate /etc/letsencrypt/live/design.taride.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/design.taride.org/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

        root /var/www/taride/design/current;
        index index.html;

        location /fonts/ { access_log off; expires 1y; }
        location ~* \.(css|woff2|svg)$ { access_log off; expires 7d; }
        location / {
            expires 5m;
            try_files $uri $uri/ =404;
        }
    }
    # === END TARIDE design ===
