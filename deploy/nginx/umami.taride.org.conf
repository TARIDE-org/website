# Paste into the http { ... } block of /opt/prijsprofeet/nginx/nginx.conf,
# near the existing analytics.prijsprofeet.nl blocks. This serves the SAME
# Umami container behind a TARIDE-branded hostname; the upstream is the
# existing `umami` upstream defined at the top of nginx.conf.

    # HTTP -> HTTPS redirect (umami.taride.org) + ACME webroot
    server {
        listen 80;
        listen [::]:80;
        server_name umami.taride.org;

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://umami.taride.org$request_uri;
        }
    }

    # umami.taride.org — TARIDE-branded Umami front
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name umami.taride.org;

        ssl_certificate /etc/letsencrypt/live/umami.taride.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/umami.taride.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        location / {
            proxy_pass http://umami;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
