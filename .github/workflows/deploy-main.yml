name: Deploy Main

on:
  push:
    branches: [main]
    paths:
      - 'src/main/**'
      - 'src/shared/**'
      - 'public/**'
      - 'astro.config.main.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-main.yml'
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: self-hosted
    env:
      PUBLIC_UMAMI_URL: ${{ secrets.PUBLIC_UMAMI_URL }}
      PUBLIC_UMAMI_WEBSITE_ID: ${{ secrets.PUBLIC_UMAMI_WEBSITE_ID_MAIN }}
      DEPLOY_ROOT: /srv/taride/main
      KEEP_RELEASES: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build main
        run: npm run build:main

      - name: Atomic swap
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y%m%d-%H%M%SZ)
          NEW="${DEPLOY_ROOT}/releases/${STAMP}"
          mkdir -p "${NEW}"
          rsync -a --delete dist/main/ "${NEW}/"
          # Relative symlink target so the path resolves both on the host and
          # inside the nginx container, which mounts /srv/taride at /var/www/taride.
          ln -sfn "releases/${STAMP}" "${DEPLOY_ROOT}/current.new"
          mv -Tf "${DEPLOY_ROOT}/current.new" "${DEPLOY_ROOT}/current"
          ls -1t "${DEPLOY_ROOT}/releases" | tail -n +$((KEEP_RELEASES + 1)) | while read -r old; do
            rm -rf "${DEPLOY_ROOT}/releases/${old}"
          done
          echo "deployed: ${STAMP}"

      - name: Smoke test (HEAD /)
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -ksSo /dev/null -w "%{http_code}" -H "Host: taride.org" http://127.0.0.1/ ) || code=000
            echo "attempt ${i}: ${code}"
            case "${code}" in 200|301|302) exit 0 ;; esac
            sleep 1
          done
          exit 1
